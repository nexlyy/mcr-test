<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#c9a84c">
<title>Equipment — MCR Planet</title>
<meta name="description" content="MCR Planet equipment catalogue — industrial machinery for mining, recycling and construction.">
<!-- FAVICONS: золотое лого MCR -->
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="../favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
<link rel="manifest" href="../manifest.json">
<!-- EARLY BOOT: scroll-fix + theme detect -->
<script>
  try { if ('scrollRestoration' in history) history.scrollRestoration = 'manual'; } catch(e){}
  window.scrollTo(0, 0);
  document.documentElement.scrollTop = 0;
  // Theme
  try {
    var savedTheme = localStorage.getItem('mcr_theme');
    if (savedTheme === '1' || savedTheme === 'light') {
      document.documentElement.className = 'light';
    } else if (!savedTheme && window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
      document.documentElement.className = 'light';
    }
  } catch(e){}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/base.css">
<link rel="stylesheet" href="../assets/css/equipment.css">
<!-- jsPDF для генерации брошюр -->
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js" defer></script>
</head>
<body>

<!-- ════════ TOP NAVBAR ════════ -->
<nav class="eq-nav">
  <a href="../index.html" class="eq-nav-logo">MCR Planet</a>
  <div class="eq-nav-right">
    <label class="theme-switch" title="Toggle theme" onclick="eqToggleTheme()">
      <div class="theme-track">
        <div class="theme-thumb">☾</div>
      </div>
    </label>
    <div class="nav-lang">
      <button class="lang-btn" data-lang="en" onclick="eqSetLang('en')">ENG</button>
      <span class="lang-sep">/</span>
      <button class="lang-btn" data-lang="es" onclick="eqSetLang('es')">ESP</button>
      <span class="lang-sep">/</span>
      <button class="lang-btn" data-lang="pl" onclick="eqSetLang('pl')">POL</button>
    </div>
  </div>
</nav>

<!-- ════════ BREADCRUMBS ════════ -->
<div class="eq-crumbs" id="eq-crumbs"></div>

<!-- ════════ SIDE BACK BUTTON (same style as catalog) ════════ -->
<a id="eq-back-btn" href="#" onclick="eqGoBack();return false;">← Back</a>

<!-- ════════ ROOT (всё содержимое заполняется JS) ════════ -->
<div id="eq-root">
  <!-- Hero: gallery + title -->
  <section class="eq-hero">
    <div id="eq-gallery"></div>
    <div class="eq-info">
      <div class="eq-tag" id="eq-tag"></div>
      <h1 class="eq-title" id="eq-title"></h1>
      <p class="eq-lead" id="eq-lead"></p>
      <div class="eq-cta-group">
        <a class="eq-cta" id="eq-cta-top" href="../index.html#contact">Request Information →</a>
        <button class="eq-cta eq-cta-pdf" id="eq-pdf-btn" onclick="eqGeneratePDF()" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-2px;margin-right:6px;"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM8 17h8v1.5H8V17zm0-3h8v1.5H8V14zm0-3h5v1.5H8V11z"/></svg>
          <span id="eq-pdf-label">Download PDF</span>
        </button>
      </div>
    </div>
  </section>

  <!-- Content: features + specs + partner -->
  <section class="eq-content">
    <h2 class="eq-section-title" id="eq-features-title">Key Features</h2>
    <ul class="eq-features" id="eq-features"></ul>

    <div id="eq-specs-block"></div>

    <div class="eq-partner" id="eq-partner-block" style="display:none;"></div>

    <div class="eq-bottom-cta">
      <h3 id="eq-cta-title">Interested in this equipment?</h3>
      <p id="eq-cta-desc"></p>
      <a class="eq-cta" id="eq-cta-btn" href="../index.html#contact">Request Information →</a>
    </div>
  </section>
</div>

<!-- Lightbox для увеличения фото -->
<div id="eq-lightbox" onclick="eqCloseLightbox()">
  <button class="lb-close" onclick="event.stopPropagation(); eqCloseLightbox();">✕</button>
  <img id="eq-lightbox-img" src="" alt="">
</div>

<!-- ════════ DATA + LOGIC ════════ -->
<script src="../assets/js/catalog-data.js"></script>
<script src="../assets/js/equipment-page.js"></script>
<script src="../assets/js/eq-pdf.js"></script>

<!-- Service Worker -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('/sw.js').catch(function(){});
    });
  }
</script>
</body>
</html>
